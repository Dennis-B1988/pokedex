<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="../img/pokemon-icon.png" />
    <link rel="stylesheet" href="../css/style.css" />
    <!-- <link rel="stylesheet" href="../css/footer.css" /> -->
    <script src="../js/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../js/includesHTML.js"></script>

    <script src="../js/script.js"></script>
    <title>Pokedex</title>
  </head>
  <body id="body" onload="init()">
    <div w3-include-html="templates/header.html" class="header"></div>

    <section id="main" class="main">
      <div id="pokemon_search" class="pokemon_search"></div>

      <div id="pokemon">
        <div id="pokemon_container_1" class="pokemon_container"></div>
      </div>

      <div class="more_pokemon">
        <div id="load_more_pokemon" class="load_more_pokemon" onclick="loadPokemon()">Load More</div>
      </div>
    </section>

    <div id="big_content" class="big_content">
      <div class="big_content_container">
        <div class="picture_arrow arrow_left">
          <img class="big_backward" onclick="pokemonBackward(pokemonBig)" src="../img/icons8-backward-100.png" alt="arrow backwards" />
        </div>
        <div class="placeholder"></div>

        <div id="pokedex_big" class="pokedex_big_container" onclick="closeBigPokedex()"></div>

        <div class="picture_arrow arrow_right">
          <img class="big_forward" onclick="pokemonForward(pokemonBig)" src="../img/icons8-forward-100.png" alt="arrow forwards" />
        </div>
        <div class="picture_arrow_small_screen">
          <img class="small_backward" onclick="pokemonBackward(pokemonBig)" src="../img/icons8-backward-50.png" alt="arrow backwards" />
          <img class="small_forward" onclick="pokemonForward(pokemonBig)" src="../img/icons8-forward-50.png" alt="arrow forwards" />
        </div>
      </div>
    </div>
    <div w3-include-html="templates/footer.html" class="footer"></div>
  </body>
</html>
